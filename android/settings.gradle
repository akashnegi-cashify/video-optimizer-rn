pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'CashifyOps'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Flutter add-to-app: pre-built AAR approach.
// The AAR is built ahead of time via:
//   cd flutter_module && flutter build aar --no-debug --no-profile --dart-define=env=$FLAVOR
// The host consumes it from flutter_module/build/host/outputs/repo (see android/build.gradle).
//
// After the AAR build, scripts/fix_aar_artifacts.sh post-processes the output to handle
// plugins whose flat-file or plugin-local maven deps don't survive the AAR boundary
// (notably flutter_tesseract_ocr and ffmpeg_kit_flutter_android).
