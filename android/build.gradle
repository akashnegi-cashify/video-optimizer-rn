// =====================================================================
// Cashify-OPS: root build.gradle (RN host)
// Loads signing credentials from android/local.properties and exposes
// them as rootProject.ext.credentials for app/build.gradle.
// =====================================================================

buildscript {
    // Load signing credentials early so app/build.gradle can reference them.
    def localPropertiesFile = rootProject.file("local.properties")
    if (localPropertiesFile.exists()) {
        def properties = new Properties()
        localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        def storeFileStage = properties.getProperty("CASHIFY_STAGE")
        def storeFileProd = properties.getProperty("CASHIFY_PROD")
        def keyAlias = properties.getProperty("SIGNING_CONFIGS_KEY_ALIAS")
        def keyPassword = properties.getProperty("SIGNING_CONFIGS_KEY_PASSWORD")
        def storePassword = properties.getProperty("SIGNING_CONFIGS_STORE_PASSWORD")
        if (keyAlias != null && storePassword != null && storeFileProd != null && storeFileStage != null) {
            ext.credentials = [
                storeFileStage: storeFileStage,
                storeFileProd : storeFileProd,
                keyAlias      : keyAlias,
                keyPassword   : keyPassword,
                storePassword : storePassword,
            ]
        }
    }

    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
        classpath("com.google.firebase:firebase-crashlytics-gradle:3.0.2")
    }
}

allprojects {
    repositories {
        // Flutter add-to-app: pre-built AAR output from `cd flutter_module && flutter build aar`.
        // Anchored to rootProject so it resolves correctly from every subproject.
        maven { url uri("${rootProject.projectDir}/../flutter_module/build/host/outputs/repo") }
        // Flutter engine artifacts (debug / profile / release).
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
    }
}

apply plugin: "com.facebook.react.rootproject"
