ext {
    cshCompileSdkVersion = 35
    cshMinSdkVersion = 21
    cshTargetSdkVersion = 32
    cd_core_ktx = '1.9.0'
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    afterEvaluate { project ->
        if (project.name == "face_detector") {
            project.android.namespace = "in.cashify.face_detector"
        } else if (project.name == "firebase_crashlytics") {
            project.android.namespace = "io.flutter.plugins.firebase.crashlytics"
        } else if (project.name == "flutter_image_compress") {
            project.android.namespace = "com.google.firebase.crashlytics"
        } else if (project.name == "flutter_jailbreak_detection") {
            project.android.namespace = "appmire.be.flutterjailbreakdetection"
        } else if (project.name == "text_recognizer") {
            project.android.namespace = "in.cashify.text_recognizer"
        } else if (project.name == "udid") {
            project.android.namespace = "in.reglobe.udid"
        } else if (project.name == "video_thumbnail") {
            project.android.namespace = "xyz.justsoft.video_thumbnail"
        } else if (project.name == "webview_cookie_manager") {
            project.android.namespace = "io.flutter.plugins.webview_cookie_manager"
        } else if (project.name == "device_info_plus") {
            project.android.namespace = "dev.fluttercommunity.plus.device_info"
        } else if (project.name == "flutter_tesseract_ocr") {
            project.android.namespace = "io.paratoner.flutter_tesseract_ocr"
        } else if (project.name == "assets_audio_playe") {
            project.android.namespace = "com.github.florent37.assets_audio_player"
        } else if (project.name == "android_id") {
            project.android.namespace = "dev.fluttercommunity.android_id"
        }

    }
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
