apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "kotlin-parcelize"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

// react-native-config: per flavor × buildType env file selection.
// versionName / versionCode are now read from the active env file via project.env.get(...).
project.ext.envConfigFiles = [
    stageDebug     : "../env/.env.stage.local",
    stageRelease   : "../env/.env.stage",
    betaDebug      : "../env/.env.beta.local",
    betaRelease    : "../env/.env.beta",
    prodTestDebug  : "../env/.env.prodTest.local",
    prodTestRelease: "../env/.env.prodTest",
    prodDebug      : "../env/.env.prod.local",
    prodRelease    : "../env/.env.prod",
]
apply from: new File(rootProject.projectDir, "../node_modules/react-native-config/android/dotenv.gradle")

react {
    autolinkLibrariesWithApp()

    // Skip JS bundle generation for these debug variants (Metro serves the bundle).
    debuggableVariants = ["prodDebug", "betaDebug", "stageDebug", "prodTestDebug"]
}

/**
 * Enable Proguard on release builds. Rules from proguard-rules.pro
 * (merged: Flutter + RN/Hermes + WebView JS interfaces + AGP defaults).
 */
def enableProguardInReleaseBuilds = true

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "in.cashify.androidtrc"

    defaultConfig {
        applicationId "in.cashify.androidtrc"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode project.env.get("CURRENT_PROJECT_VERSION").toInteger()
        versionName project.env.get("MARKETING_VERSION")
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        dataBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (rootProject.hasProperty("credentials")) {
            def credentials = rootProject.ext.credentials
            cashifystage {
                keyAlias credentials.keyAlias
                keyPassword credentials.keyPassword
                storeFile file(credentials.storeFileStage)
                storePassword credentials.storePassword
            }
            cashify {
                keyAlias credentials.keyAlias
                keyPassword credentials.keyPassword
                storeFile file(credentials.storeFileProd)
                storePassword credentials.storePassword
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
        release {
            debuggable false
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            ndk {
                debugSymbolLevel 'FULL'
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            }
            firebaseCrashlytics {
                mappingFileUploadEnabled false
            }
        }
    }

    flavorDimensions += "tier"
    productFlavors {
        prod {
            dimension "tier"
            applicationId "in.cashify.androidtrc"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashify : signingConfigs.debug
        }
        beta {
            dimension "tier"
            applicationId "in.cashify.androidtrc.beta"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashify : signingConfigs.debug
        }
        stage {
            dimension "tier"
            applicationId "in.cashify.androidtrc.stage"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashifystage : signingConfigs.debug
        }
        prodTest {
            dimension "tier"
            applicationId "in.cashify.androidtrc.prodtest"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashify : signingConfigs.debug
        }
    }

    configurations.all {
        resolutionStrategy {
            // Preserved from the original Flutter project's app/build.gradle.
            force "androidx.camera:camera-core:1.3.4"
            force "androidx.camera:camera-camera2:1.3.4"
            force "androidx.camera:camera-lifecycle:1.3.4"
            force "androidx.camera:camera-video:1.3.4"
            force "com.google.errorprone:error_prone_annotations:2.30.0"
        }

        // react-native-mmkv@4 pulls in `io.github.zhongwuzw:mmkv:2.4.0`, which publishes the
        // same `com.tencent.mmkv.*` classes as the official `com.tencent:mmkv:2.4.0` that the
        // Flutter `mmkv` plugin already brings in via the AAR. Two AARs → duplicate-class
        // build failure. The zhongwuzw artifact is a maintainer re-publish (same bytes), so
        // we drop it and let everyone use the canonical Tencent jar.
        exclude group: "io.github.zhongwuzw", module: "mmkv"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
            pickFirsts += [
                'lib/x86/libc++_shared.so',
                'lib/x86_64/libc++_shared.so',
                'lib/armeabi-v7a/libc++_shared.so',
                'lib/arm64-v8a/libc++_shared.so',
                // libmmkv.so ships in both the Flutter `mmkv` plugin's transitive dep
                // (com.tencent:mmkv) and react-native-mmkv@4's transitive dep. Both AARs
                // contain bytecode-identical copies of the same 2.4.0 native lib, so the
                // first one wins.
                'lib/x86/libmmkv.so',
                'lib/x86_64/libmmkv.so',
                'lib/armeabi-v7a/libmmkv.so',
                'lib/arm64-v8a/libmmkv.so',
            ]
        }
    }

    androidResources {
        noCompress 'tflite'
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
        disable 'InvalidPackage'
        ignoreWarnings true
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Flutter add-to-app — pre-built AAR.
    //
    // The Flutter Gradle plugin produces THREE flavors of the AAR depending on the
    // flags passed to `flutter build aar`:
    //   - debug   → JIT mode + Dart VM Service (required for `flutter attach` + hot reload)
    //   - profile → AOT + perf instrumentation
    //   - release → AOT, stripped (production)
    //
    // Wire each Android build type to the matching Flutter AAR variant so debug builds
    // get hot reload and release builds get the optimized binary.
    debugImplementation   "in.cashify.androidtrc:flutter_debug:1.0"
    releaseImplementation "in.cashify.androidtrc:flutter_release:1.0"

    // Firebase BoM (Analytics + Crashlytics + Remote Config — matches Flutter side).
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-config-ktx'

    // AndroidX support (used by Flutter plugins like local_auth and image_picker).
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.multidex:multidex:2.0.1'

    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
