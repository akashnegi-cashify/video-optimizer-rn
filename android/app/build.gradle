def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
apply plugin: 'kotlin-android-extensions'
apply plugin: 'kotlin-kapt'
apply plugin: 'com.google.firebase.firebase-perf'
apply plugin: 'com.google.firebase.crashlytics'
apply plugin: 'com.google.gms.google-services'


android {
    compileSdkVersion 33
    ndkVersion "23.1.7779620"
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
        abortOnError false
        ignoreWarnings true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "in.cashify.androidtrc"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }

    buildFeatures {
        dataBinding = true
    }

    androidExtensions {
        experimental = true
    }

    signingConfigs {
        stage {
            keyAlias credentials.keyAlias
            keyPassword credentials.keyAlias
            storeFile file("${credentials.storeFileStage}")
            storePassword credentials.storePassword
        }
        cashify {
            keyAlias credentials.keyAlias
            keyPassword credentials.keyPassword
            storeFile file("${credentials.storeFileProd}")
            storePassword credentials.storePassword
        }
    }

    buildTypes {
        staging {
            debuggable true
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        release {
            minifyEnabled true
            debuggable false
            shrinkResources false
            signingConfig signingConfigs.cashify
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
//            ndk {
//                debugSymbolLevel = 'FULL'
//            }
        }

        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    flavorDimensions "tier"

    productFlavors {
        prod {
            applicationId "in.cashify.androidtrc"
            signingConfig signingConfigs.cashify
            dimension "tier"
        }
        beta {
            applicationId "in.cashify.androidtrc.beta"
            signingConfig signingConfigs.cashify
            dimension "tier"
        }
        stage {
            applicationId "in.cashify.androidtrc.stage"
            dimension "tier"
            signingConfig signingConfigs.stage

        }
    }

//    compileOptions {
//        sourceCompatibility JavaVersion.VERSION_1_8
//        targetCompatibility JavaVersion.VERSION_1_8
//    }
////
//    kotlinOptions {
//        jvmTarget = JavaVersion.VERSION_1_8
//    }

}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'com.android.support:multidex:1.0.3'
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.core:core-ktx:1.3.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    implementation 'androidx.lifecycle:lifecycle-extensions:2.2.0'
//    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.2.0'
    implementation 'com.google.android.material:material:1.2.1'
    implementation 'com.google.dagger:dagger:2.40'
    implementation 'com.google.dagger:dagger-android-support:2.40'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'androidx.test.ext:junit-ktx:1.1.3'
    kapt 'com.google.dagger:dagger-compiler:2.40'
    kapt 'com.google.dagger:dagger-android-processor:2.40'
    implementation "com.squareup.retrofit2:converter-gson:2.9.0"
    implementation 'in.cashify.libs.rest-ktx:rest-ktx-canary:2.0.8'
//    implementation project(path: ':rest-ktx')
    implementation "com.squareup.okhttp3:logging-interceptor:4.7.2"
    implementation "com.squareup.picasso:picasso:2.71828"
    implementation 'com.facebook.shimmer:shimmer:0.4.0@aar'
    implementation('de.keyboardsurfer.android.widget:crouton:1.8.5@aar') {
        exclude group: 'com.google.android', module: 'support-v4'
    }


    implementation 'androidx.exifinterface:exifinterface:1.3.2'
    //noinspection GradleDependency
    implementation 'com.airbnb.android:lottie:2.7.0'
    implementation "com.jakewharton.retrofit:retrofit2-kotlin-coroutines-adapter:0.9.2"
    implementation "com.google.android.gms:play-services-auth-api-phone:17.5.0"
    implementation 'com.google.android.gms:play-services-vision:20.1.3'
    implementation 'in.cashify:barcode-scanner:1.0.4'


    testImplementation 'junit:junit:4.13.1'
    androidTestImplementation 'androidx.test:runner:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'com.google.android.gms:play-services-tagmanager:17.0.0'


    //Chucker
    stageImplementation "com.github.ChuckerTeam.Chucker:library:3.5.2"
    betaImplementation "com.github.ChuckerTeam.Chucker:library:3.5.2"
    prodImplementation "com.github.ChuckerTeam.Chucker:library-no-op:3.5.2"

    implementation 'com.github.bumptech.glide:glide:4.11.0'
    implementation 'com.amazonaws:aws-android-sdk-s3:2.17.1'


    // implementation 'com.google.firebase:firebase-analytics:21.1.0'
    // implementation 'com.google.firebase:firebase-crashlytics:18.2.12'


    // Import the BoM for the Firebase platform
    implementation platform('com.google.firebase:firebase-bom:30.3.1')

    // Declare the dependencies for the Crashlytics and Analytics libraries
    // When using the BoM, you don't specify versions in Firebase library dependencies
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-analytics-ktx'
//
    implementation 'in.cashify:s3-file-uploader-beta:2.2.0.5'


    // Declare the dependencies for the Crashlytics and Analytics libraries
    // When using the BoM, you don't specify versions in Firebase library dependencies


    implementation 'com.google.firebase:firebase-perf-ktx'


}
