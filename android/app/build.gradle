apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "kotlin-parcelize"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

// Load versionName / versionCode from android/local.properties so they stay in sync
// with the existing Flutter-side conventions (flutter.versionName / flutter.versionCode).
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def appVersionName = localProperties.getProperty('flutter.versionName') ?: '6.0.4'
def appVersionCode = (localProperties.getProperty('flutter.versionCode') ?: '87').toInteger()

react {
    autolinkLibrariesWithApp()

    // Skip JS bundle generation for these debug variants (Metro serves the bundle).
    debuggableVariants = ["prodDebug", "betaDebug", "stageDebug"]
}

/**
 * Enable Proguard on release builds. Rules from proguard-rules.pro
 * (merged: Flutter + RN/Hermes + WebView JS interfaces + AGP defaults).
 */
def enableProguardInReleaseBuilds = true

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "in.cashify.androidtrc"

    defaultConfig {
        applicationId "in.cashify.androidtrc"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        dataBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (rootProject.hasProperty("credentials")) {
            def credentials = rootProject.ext.credentials
            cashifystage {
                keyAlias credentials.keyAlias
                keyPassword credentials.keyPassword
                storeFile file(credentials.storeFileStage)
                storePassword credentials.storePassword
            }
            cashify {
                keyAlias credentials.keyAlias
                keyPassword credentials.keyPassword
                storeFile file(credentials.storeFileProd)
                storePassword credentials.storePassword
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
        release {
            debuggable false
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            ndk {
                debugSymbolLevel 'FULL'
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            }
            firebaseCrashlytics {
                mappingFileUploadEnabled false
            }
        }
    }

    flavorDimensions += "tier"
    productFlavors {
        prod {
            dimension "tier"
            applicationId "in.cashify.androidtrc"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashify : signingConfigs.debug
        }
        beta {
            dimension "tier"
            applicationId "in.cashify.androidtrc.beta"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashify : signingConfigs.debug
        }
        stage {
            dimension "tier"
            applicationId "in.cashify.androidtrc.stage"
            signingConfig rootProject.hasProperty("credentials") ? signingConfigs.cashifystage : signingConfigs.debug
        }
    }

    configurations.all {
        resolutionStrategy {
            // Preserved from the original Flutter project's app/build.gradle.
            force "androidx.camera:camera-core:1.3.4"
            force "androidx.camera:camera-camera2:1.3.4"
            force "androidx.camera:camera-lifecycle:1.3.4"
            force "androidx.camera:camera-video:1.3.4"
            force "com.google.errorprone:error_prone_annotations:2.30.0"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
            pickFirsts += [
                'lib/x86/libc++_shared.so',
                'lib/x86_64/libc++_shared.so',
                'lib/armeabi-v7a/libc++_shared.so',
                'lib/arm64-v8a/libc++_shared.so',
            ]
        }
    }

    androidResources {
        noCompress 'tflite'
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
        disable 'InvalidPackage'
        ignoreWarnings true
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Flutter add-to-app — pre-built AAR.
    //
    // The Flutter Gradle plugin produces THREE flavors of the AAR depending on the
    // flags passed to `flutter build aar`:
    //   - debug   → JIT mode + Dart VM Service (required for `flutter attach` + hot reload)
    //   - profile → AOT + perf instrumentation
    //   - release → AOT, stripped (production)
    //
    // Wire each Android build type to the matching Flutter AAR variant so debug builds
    // get hot reload and release builds get the optimized binary.
    debugImplementation   "in.cashify.androidtrc:flutter_debug:1.0"
    releaseImplementation "in.cashify.androidtrc:flutter_release:1.0"

    // Firebase BoM (Analytics + Crashlytics + Remote Config — matches Flutter side).
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-config-ktx'

    // AndroidX support (used by Flutter plugins like local_auth and image_picker).
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.multidex:multidex:2.0.1'

    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
